name: backend cd package

on:
  push:
    branches:
      - master

permissions:
  packages: write
  contents: read

jobs:
  build-push:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          # - service: frontend
          #   context: .
          #   file: frontend.dockerfile
          - service: backend
            context: ./backend
            file: Dockerfile

    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          platforms: linux/amd64, linux/arm64
          push: true

          cache-from: type=gha
          cache-to: type=gha,mode=max

          tags: |
            ghcr.io/${{ toLower(github.repository_owner) }}/${{ matrix.service }}:${{ github.sha }}
            ghcr.io/${{ toLower(github.repository_owner) }}/${{ matrix.service }}:latest
