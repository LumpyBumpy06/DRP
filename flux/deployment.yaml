apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: quiet-signal
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/lumpybumpy06/backend:1780030089530 # {"$imagepolicy": "quiet-signal:quiet-signal-backend"}
          env:
            - name: DATABASE_TYPE
              value: postgres
            - name: POSTGRES_HOST
              value: quiet-signal-postgres-rw
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_DB
              value: quiet-signal
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: quiet-signal-postgres-secret
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: quiet-signal-postgres-secret
                  key: password
            - name: FIREBASE_CREDENTIALS_JSON
              valueFrom:
                secretKeyRef:
                  name: firebase-auth-secret
                  key: firebase-credentials.json
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /docs
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /docs
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20
